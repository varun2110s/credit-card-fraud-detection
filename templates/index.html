<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Fraud Detection</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Fraud Detection</h1>
        <input type="text" id="features" placeholder="Enter transaction features (comma separated)">
        <button onclick="predict()">Check Transaction</button>
        <div id="result"></div>
    </div>

    <script>
        async function predict() {
            const input = document.getElementById('features').value;
            const features = input.split(',').map(Number);
            const response = await fetch('/predict', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({features: features})
            });
            const data = await response.json();
            const result = document.getElementById('result');
            result.innerText = data.prediction;
            result.className = data.prediction === 'Fraud' ? 'fraud' : 'normal';
        }
    </script>
</body>
</html>
